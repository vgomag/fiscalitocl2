<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiscalito — Asistente Jurídico</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #f5f5f7;
            color: #111827;
        }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 1200px; width: 100%; }
        .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; transform: translateY(-2px); }
        h1 { font-size: 28px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 6px; color: #9ca3af; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: inherit; }
        .form-group input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table thead { background: #fafafa; border-bottom: 1px solid #e5e7eb; }
        .table th { padding: 12px; text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; color: #6b7280; }
        .table td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
        .table tbody tr:hover { background: #fafafa; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .error { color: #ef4444; font-size: 12px; margin-top: 8px; }
        .success { color: #10b981; font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="app"></div>
    </div>

    <script type="module">
        // ⚠️ IMPORTANTE: NO INCLUYA sb_secret en código cliente
        // SOLO use ANON_KEY (pública)
        
        const SUPABASE_URL = 'https://zgoxrzbkftzulsphmtfk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnb3hyemJrZnR6dWxzcGhtdGZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDY2MDYsImV4cCI6MjA4OTc4MjYwNn0.Kp_eL_AyuxcvtnRQeld2DuY0lsd1Etb4M9cnnZxGBZI';

        // Crear cliente Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Estado global
        let currentUser = null;
        let casos = [];

        // Elementos del DOM
        const appDiv = document.getElementById('app');

        // Inicializar
        async function init() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                currentUser = session?.user;
                
                if (currentUser) {
                    await loadCases();
                    renderApp();
                } else {
                    renderLogin();
                }
            } catch (error) {
                console.error('Error en init:', error);
                appDiv.innerHTML = `<div class="card" style="color: #ef4444;"><h1>⚠️ Error</h1><p>${error.message}</p></div>`;
            }
        }

        // Cargar casos
        async function loadCases() {
            try {
                const { data, error } = await supabase
                    .from('cases')
                    .select('*')
                    .order('numero_expediente', { ascending: true });

                if (error) throw error;
                casos = data || [];
                console.log('✅ Casos cargados:', casos.length);
            } catch (error) {
                console.error('Error al cargar casos:', error);
            }
        }

        // Render Login
        function renderLogin() {
            appDiv.innerHTML = `
                <div class="card" style="max-width: 400px; margin: 0 auto; text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 16px;">⚖️</div>
                    <h1>Fiscalito</h1>
                    <p style="color: #6b7280; margin-bottom: 24px;">Asistente Jurídico</p>
                    
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>CORREO</label>
                            <input type="email" id="email" required placeholder="tu@email.com">
                        </div>
                        <div class="form-group">
                            <label>CONTRASEÑA</label>
                            <input type="password" id="password" required placeholder="Contraseña">
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Iniciar sesión</button>
                        <div id="loginError"></div>
                    </form>
                </div>
            `;
        }

        // Render App
        function renderApp() {
            appDiv.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h1>📋 Mis Casos</h1>
                    <button class="btn btn-primary" onclick="handleLogout()">Salir</button>
                </div>
                
                <div class="card">
                    ${casos.length === 0 ? 
                        '<p style="color: #9ca3af; text-align: center; padding: 40px;">Sin casos registrados</p>' :
                        `<table class="table">
                            <thead>
                                <tr>
                                    <th>Expediente</th>
                                    <th>Procedimiento</th>
                                    <th>Materia</th>
                                    <th>Protocolo</th>
                                    <th>📁 Drive</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${casos.map(caso => `
                                    <tr>
                                        <td><strong>${caso.numero_expediente || '-'}</strong></td>
                                        <td>${caso.tipo_procedimiento || '-'}</td>
                                        <td>${caso.materia || '-'}</td>
                                        <td>${caso.protocolo || '-'}</td>
                                        <td>
                                            ${caso.drive_folder_url ? 
                                                `<a href="${caso.drive_folder_url}" target="_blank" class="badge">✓ Vinculado</a>` :
                                                '<span style="color: #d1d5db;">-</span>'
                                            }
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>`
                    }
                </div>
            `;
        }

        // Handlers
        window.handleLogin = async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                
                currentUser = data.user;
                await loadCases();
                renderApp();
            } catch (error) {
                errorDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
            }
        };

        window.handleLogout = async function() {
            try {
                await supabase.auth.signOut();
                currentUser = null;
                renderLogin();
            } catch (error) {
                console.error('Error al cerrar sesión:', error);
            }
        };

        // Iniciar app
        init();
    </script>
</body>
</html>
