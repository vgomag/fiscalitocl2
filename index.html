<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiscalito — Asistente Jurídico</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48dGV4dCB4PSI1MCIgeT0iNTAiIGZvbnQtc2l6ZT0iNjAiIGZvbnQtd2VpZ2h0PSJib2xkIiBmaWxsPSIjMzMzMyIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPuKapjwvdGV4dD48L3N2Zz4=">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        /* ====================================================================
           FISCALITO DESIGN v2 — Design System
           ======================================================================
           Tipografía: Plus Jakarta Sans + Geist Mono
           ====================================================================== */

        :root {
            /* Palette */
            --bg-primary: #f5f5f7;
            --surface: #ffffff;
            --surface2: #fafafa;
            --border: rgba(0,0,0,.08);
            --border2: rgba(0,0,0,.12);
            --gold: #4f46e5;
            --gold-dim: #4338ca;
            --gold-glow: rgba(79,70,229,.06);
            --text: #111827;
            --text-dim: #374151;
            --text-muted: #9ca3af;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --accent: #ec4899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            line-height: 1.6;
        }

        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        #root { width: 100%; }

        /* Components */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 3px rgba(0,0,0,.05);
        }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--gold);
            color: white;
        }

        .btn-primary:hover {
            background: var(--gold-dim);
            transform: translateY(-2px);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table thead {
            background: var(--surface2);
            border-bottom: 1px solid var(--border2);
        }

        .table th {
            padding: 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .table tbody tr:hover {
            background: var(--surface2);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        /* Auth */
        .auth-container {
            max-width: 400px;
            margin: 60px auto;
            text-align: center;
        }

        .auth-form {
            background: var(--surface);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }

        .auth-form h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .auth-form p {
            color: var(--text-dim);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }

        /* Navbar */
        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 48px;
        }

        .navbar-brand {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .navbar-menu {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .navbar-menu a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .navbar-menu a:hover {
            color: var(--gold);
        }

        /* Page */
        .page-header {
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--text-dim);
        }

        /* Utilities */
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }
        .gap-2 { gap: 8px; }
        .flex { display: flex; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // Supabase Configuration
        const SB_URL='https://zgoxrzbkftzulsphmtfk.supabase.co';
        const SB_KEY='sb_publishable_qIWOIFlcCKbtr8_2Gf0FQA_73kSqD9-';

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // App State
        let currentUser = null;
        let casos = [];
        let currentPage = 'mis-casos';

        // Initialize
        async function init() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                currentUser = session?.user || null;
                
                if (currentUser) {
                    loadCases();
                    renderApp();
                } else {
                    renderAuth();
                }
            } catch (error) {
                console.error('Init error:', error);
            }
        }

        // Load cases from database
        async function loadCases() {
            try {
                const { data, error } = await supabase
                    .from('cases')
                    .select('*')
                    .order('numero_expediente', { ascending: true });

                if (error) throw error;
                casos = data || [];
                console.log('Casos cargados:', casos.length);
            } catch (error) {
                console.error('Error al cargar casos:', error);
            }
        }

        // Render Authentication Page
        function renderAuth() {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="auth-container">
                    <div class="auth-form">
                        <h1>⚖️ Fiscalito</h1>
                        <p>Asistente Jurídico</p>
                        <form onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label>CORREO</label>
                                <input type="email" id="email" required placeholder="tu@email.com">
                            </div>
                            <div class="form-group">
                                <label>CONTRASEÑA</label>
                                <input type="password" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Iniciar sesión</button>
                        </form>
                        <p style="margin-top: 16px; font-size: 12px; color: var(--text-muted);">
                            ¿No tienes cuenta? <a href="#" onclick="toggleRegister()">Regístrate</a>
                        </p>
                    </div>
                </div>
            `;
        }

        // Render App
        function renderApp() {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="navbar">
                    <div class="navbar-content">
                        <div class="navbar-brand">⚖️ Fiscalito</div>
                        <ul class="navbar-menu">
                            <li><a href="#" onclick="setPage('mis-casos')">Mis Casos</a></li>
                            <li><a href="#" onclick="setPage('documentos')">Documentos</a></li>
                            <li><a href="#" onclick="handleLogout()">Salir</a></li>
                        </ul>
                    </div>
                </div>
                <div class="container">
                    ${currentPage === 'mis-casos' ? renderMisCasos() : renderDocumentos()}
                </div>
            `;
        }

        // Render Mis Casos
        function renderMisCasos() {
            return `
                <div class="page-header">
                    <h1>📋 Mis Casos</h1>
                    <p>Gestiona todos tus expedientes jurídicos</p>
                </div>
                <div class="card">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Expediente</th>
                                <th>Procedimiento</th>
                                <th>Materia</th>
                                <th>Protocolo</th>
                                <th>📁 Drive</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${casos.map(caso => `
                                <tr>
                                    <td><strong>${caso.numero_expediente || '-'}</strong></td>
                                    <td>${caso.tipo_procedimiento || '-'}</td>
                                    <td>${caso.materia || '-'}</td>
                                    <td>${caso.protocolo || '-'}</td>
                                    <td>
                                        ${caso.drive_folder_url ? 
                                            `<a href="${caso.drive_folder_url}" target="_blank" class="badge badge-success">✓ Vinculado</a>` :
                                            `<span style="color: var(--text-muted); font-size: 12px;">-</span>`
                                        }
                                    </td>
                                    <td>
                                        <button class="btn btn-primary" onclick="editCase(${caso.id})">Editar</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // Render Documentos
        function renderDocumentos() {
            return `
                <div class="page-header">
                    <h1>📄 Documentos</h1>
                    <p>Banco de documentos y plantillas</p>
                </div>
                <div class="card">
                    <p>Módulo de documentos en construcción...</p>
                </div>
            `;
        }

        // Navigation
        window.setPage = function(page) {
            currentPage = page;
            renderApp();
        };

        // Auth Handlers
        window.handleLogin = async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                currentUser = data.user;
                loadCases();
                renderApp();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.handleLogout = async function() {
            try {
                await supabase.auth.signOut();
                currentUser = null;
                renderAuth();
            } catch (error) {
                console.error('Logout error:', error);
            }
        };

        window.editCase = function(caseId) {
            const caso = casos.find(c => c.id === caseId);
            if (!caso) return;
            alert(`Editing case: ${caso.numero_expediente}`);
        };

        // Start
        init();
    </script>
</body>
</html>
